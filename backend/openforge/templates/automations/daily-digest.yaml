name: Daily Digest
slug: daily-digest
description: Runs the Deep Researcher agent every morning at 7 AM to compile a digest of recent knowledge updates and web developments.
agent_slug: deep-researcher
trigger_config:
  type: cron
  cron: "0 7 * * *"
budget_config:
  max_steps: 20
  max_tokens: 50000
  timeout_seconds: 300
output_config:
  save_to_knowledge: true
  artifact_type: report
tags:
  - digest
  - daily
  - template
