name: Trend Forecast
slug: trend-forecast
description: >
  Trend forecasting pipeline: multi-source collection, page reading,
  parallel pattern detection and sentiment analysis, risk scenario modeling, and report.
tags: [trends, forecast, analysis, template]

nodes:
  - agent_slug: news-scanner
    node_key: news_scan
    static_inputs:
      period: last_month
  - agent_slug: web-searcher
    node_key: web_search
  - agent_slug: knowledge-retriever
    node_key: knowledge
  - agent_slug: page-reader
    node_key: reader
  - agent_slug: pattern-detector
    node_key: patterns
    static_inputs:
      detection_type: trends
  - agent_slug: sentiment-analyzer
    node_key: sentiment
  - agent_slug: risk-assessor
    node_key: risk
  - agent_slug: report-writer
    node_key: output
    static_inputs:
      report_type: analysis

wiring:
  - from: web_search.results
    to: reader.urls
  - from: news_scan.news_items
    to: reader.urls
  - from: reader.extracted_content
    to: patterns.data_series
  - from: reader.extracted_content
    to: sentiment.content
  - from: patterns.trend_signals
    to: risk.situation_data
  - from: sentiment.sentiment_summary
    to: risk.situation_data
  - from: risk.scenarios
    to: output.content
  - from: risk.risk_matrix
    to: output.content

deployment_inputs:
  - news_scan.topics
  - web_search.query
  - knowledge.query
  - risk.risk_domain

sinks:
  - type: knowledge_create
    node_key: save_forecast
    wired_from: output.report
    config:
      knowledge_type: document
      title_template: "Trend Forecast - {{date}}"

suggested_trigger:
  type: cron
  expression: "0 8 1 * *"
