name: Knowledge Gap Filler
slug: knowledge-gap-filler
description: >
  Knowledge Curator identifies gaps in a workspace, Deep Researcher fills them,
  and new knowledge items are created.
tags:
  - knowledge
  - curation
  - research
  - template
nodes:
  - agent_slug: knowledge-curator
    node_key: gap_analysis
    static_inputs:
      curation_mode: gap_analysis
  - agent_slug: deep-researcher
    node_key: gap_filler
    static_inputs:
      depth: standard
      output_format: brief
wiring:
  - from: gap_analysis.output
    to: gap_filler.topic
deployment_inputs:
  - gap_analysis.task
suggested_trigger:
  type: interval
  every: "168h"
  description: "Weekly"
sinks:
  - type: knowledge_create
    node_key: save_research
    wired_from: gap_filler.research_brief
