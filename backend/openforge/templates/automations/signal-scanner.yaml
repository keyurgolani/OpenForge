name: Multi-Asset Signal Scanner
slug: signal-scanner
description: >
  Scans multiple assets for trading signals, runs geopolitical overlay,
  and compiles results into a structured signal report saved to knowledge.
tags:
  - trading
  - signals
  - scanner
  - template
nodes:
  - agent_slug: trading-signals
    node_key: signal_gen
    static_inputs:
      signal_type: full_multi_dimensional
      timeframe: swing
  - agent_slug: geopolitical-monitor
    node_key: geo_overlay
    static_inputs:
      impact_lens: financial_markets
      report_type: risk_assessment
  - agent_slug: content-builder
    node_key: compiler
    static_inputs:
      content_type: report
      tone: technical
      length: medium
wiring:
  - from: signal_gen.signal_report
    to: compiler.subject
  - from: geo_overlay.situation_report
    to: compiler.subject
deployment_inputs:
  - signal_gen.asset
  - geo_overlay.region_or_topic
suggested_trigger:
  type: cron
  expression: "0 6 * * 1-5"
  description: "Every weekday at 6 AM before market open"
sinks:
  - type: knowledge_create
    node_key: save_scan
    wired_from: compiler.output
    config:
      knowledge_type: note
      title_template: "Signal Scan - {{date}}"
