name: Product Landscape Research
slug: product-landscape-research
description: >
  Product research pipeline: parallel web and news collection, page reading,
  feature/pricing comparison, pattern detection, and landscape report.
tags: [product, research, comparison, template]

nodes:
  - agent_slug: web-searcher
    node_key: web_search
    static_inputs:
      num_results: 20
  - agent_slug: news-scanner
    node_key: news_scan
    static_inputs:
      period: last_month
  - agent_slug: page-reader
    node_key: reader
  - agent_slug: comparator
    node_key: comparison
  - agent_slug: pattern-detector
    node_key: patterns
    static_inputs:
      detection_type: trends
  - agent_slug: report-writer
    node_key: output
    static_inputs:
      report_type: analysis

wiring:
  - from: web_search.results
    to: reader.urls
  - from: news_scan.news_items
    to: reader.urls
  - from: reader.extracted_content
    to: comparison.items
  - from: comparison.comparison_matrix
    to: patterns.data_series
  - from: patterns.patterns
    to: output.content
  - from: comparison.ranking
    to: output.content

deployment_inputs:
  - web_search.query
  - news_scan.topics
  - comparison.criteria

sinks:
  - type: knowledge_create
    node_key: save_report
    wired_from: output.report
    config:
      knowledge_type: document
      title_template: "Product Landscape - {{date}}"

suggested_trigger:
  type: manual
