<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/forge-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="OpenForge — Self-hosted AI workspace and knowledge management" />
    <title>OpenForge</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Color scheme flash prevention — canonical list: src/lib/color-schemes.ts
      (function() {
        var valid = ['forge','ocean','verdant','rose','obsidian','sandstone','midnight','arctic','dusk','slate'];
        var s = localStorage.getItem('color-scheme');
        if (s && valid.indexOf(s) !== -1 && s !== 'forge') {
          document.documentElement.dataset.scheme = s;
        } else if (s && valid.indexOf(s) === -1) {
          localStorage.removeItem('color-scheme');
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
