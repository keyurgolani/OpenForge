services:
  openforge:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3100}:3000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://openforge:${DB_PASSWORD:-changeme}@postgres:5432/openforge
      - QDRANT_URL=http://qdrant:6333
      - WORKSPACE_ROOT=${WORKSPACE_ROOT:-/workspace}
      - UPLOADS_ROOT=/uploads
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - TOOL_SERVER_URL=http://tool-server:8001
      - REDIS_URL=redis://redis:6379/0
      - MAIN_APP_URL=http://openforge:3000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/embeddings
      - DATALAB_MODELS_DIR=/models/marker
      - MODELS_ROOT=/models
    volumes:
      - ${WORKSPACE_HOST_PATH:-./data/workspace}:/workspace
      - ${UPLOADS_HOST_PATH:-./data/uploads}:/uploads
      - ${MODELS_HOST_PATH:-./data/models}:/models
      - ${SKILLS_HOST_PATH:-./data/skills}:/skills:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://openforge:${DB_PASSWORD:-changeme}@postgres:5432/openforge
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - TOOL_SERVER_URL=http://tool-server:8001
      - MAIN_APP_URL=http://openforge:3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - HF_HOME=/models/huggingface
      - SENTENCE_TRANSFORMERS_HOME=/models/embeddings
      - DATALAB_MODELS_DIR=/models/marker
      - MODELS_ROOT=/models
    volumes:
      - ${MODELS_HOST_PATH:-./data/models}:/models
      - ${SKILLS_HOST_PATH:-./data/skills}:/skills:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      tool-server:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: ${CELERY_WORKERS:-1}
      resources:
        limits:
          memory: 4G

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: openforge
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - ${QDRANT_DATA_PATH:-./data/qdrant}:/qdrant/storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    volumes:
      - ${REDIS_DATA_PATH:-./data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  tool-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.tool-server
    environment:
      - WORKSPACE_ROOT=${WORKSPACE_ROOT:-/workspace}
      - MAIN_APP_URL=http://openforge:3000
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - SEARXNG_URL=http://searxng:8080
    volumes:
      - ${WORKSPACE_HOST_PATH:-./data/workspace}:/workspace
      - ${SKILLS_HOST_PATH:-./data/skills}:/skills
    depends_on:
      - redis
      - searxng
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - ${SEARXNG_DATA_PATH:-./docker/searxng}:/etc/searxng:rw
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
