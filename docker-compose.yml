services:
  openforge:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "${PORT:-3100}:3000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://openforge:${DB_PASSWORD:-changeme}@postgres:5432/openforge
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - WORKSPACE_ROOT=${WORKSPACE_ROOT:-/workspace}
      - UPLOADS_ROOT=/uploads
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
    volumes:
      # Read-only workspace access for main app (only tool-server can write)
      - ${WORKSPACE_HOST_PATH:-./data/workspace}:/workspace:ro
      - ${UPLOADS_HOST_PATH:-./data/uploads}:/uploads
      - ${MODELS_HOST_PATH:-./data/models}:/models
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: openforge
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: openforge
    volumes:
      - ${POSTGRES_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openforge"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  qdrant:
    image: qdrant/qdrant:v1.13.2
    volumes:
      - ${QDRANT_DATA_PATH:-./data/qdrant}:/qdrant/storage
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  redis:
    image: redis:7-alpine
    volumes:
      - ${REDIS_DATA_PATH:-./data/redis}:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    environment:
      - DATABASE_URL=postgresql+asyncpg://openforge:${DB_PASSWORD:-changeme}@postgres:5432/openforge
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - TOOL_SERVER_URL=http://tool-server:3001
      - MAIN_APP_URL=http://openforge:3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - HF_HOME=/models
      - SENTENCE_TRANSFORMERS_HOME=/models
    volumes:
      - ${MODELS_HOST_PATH:-./data/models}:/models
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      tool-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A openforge.worker.celery_app inspect ping -d celery@localhost 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G

  tool-server:
    build:
      context: .
      dockerfile: docker/Dockerfile.tools
    ports:
      - "${TOOL_SERVER_PORT:-3001}:3001"
      - "${MCP_PORT:-3002}:3002"
    environment:
      - WORKSPACE_ROOT=/workspace
      - MAIN_APP_URL=http://openforge:3000
      - REDIS_URL=redis://redis:6379/0
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ${WORKSPACE_HOST_PATH:-./data/workspace}:/workspace
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/tools/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
